<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blast Learning</title>
    <!--
      Single-page-app fallback for GitHub Pages.
      GitHub Pages has no server-side routing, so a direct visit or refresh of a
      deep link (e.g. /blastlearning/programs/cbse-plan) would 404. This page
      rewrites that path into a query the app can decode, then redirects to the
      app root so React Router can take over.
      Technique: https://github.com/rafgraph/spa-github-pages
    -->
    <script type="text/javascript">
      // Number of path segments to keep (the project base "/blastlearning/" = 1).
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
