<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 118" fill="none">
  <defs>
    <linearGradient id="blGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#E8357A"/>
      <stop offset="100%" stop-color="#1AAFCB"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse" x1="0" x2="44">
      <stop offset="0%" stop-color="#E8357A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#E8357A"/>
    </linearGradient>
  </defs>

  <!-- Speed / motion lines -->
  <rect x="14" y="17" width="24" height="5" rx="2.5" fill="url(#lineGrad)"/>
  <rect x="6"  y="30" width="32" height="5" rx="2.5" fill="url(#lineGrad)"/>
  <rect x="16" y="43" width="22" height="5" rx="2.5" fill="url(#lineGrad)"/>

  <!-- BL letters -->
  <text
    x="48" y="74"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-weight="900"
    font-size="60"
    fill="url(#blGrad)"
    letter-spacing="-2"
  >BL</text>

  <!-- BLAST LEARNING -->
  <text
    x="100" y="104"
    font-family="Arial,Helvetica,sans-serif"
    font-weight="700"
    font-size="12"
    fill="#0D1B2A"
    text-anchor="middle"
    letter-spacing="3.5"
  >BLAST LEARNING</text>
</svg>
