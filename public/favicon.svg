<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8357A"/>
      <stop offset="100%" stop-color="#1AAFCB"/>
    </linearGradient>
    <linearGradient id="ln" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8357A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#E8357A" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="13" fill="#07111F"/>
  <!-- Speed / motion lines (brand element) -->
  <rect x="7" y="17" width="12" height="3.5" rx="1.75" fill="url(#ln)"/>
  <rect x="5" y="24" width="16" height="3.5" rx="1.75" fill="url(#ln)"/>
  <rect x="8" y="31" width="10" height="3.5" rx="1.75" fill="url(#ln)"/>
  <!-- BL brand letters -->
  <text
    x="24" y="50"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-weight="900"
    font-size="30"
    fill="url(#g)"
    letter-spacing="-1"
  >BL</text>
</svg>
